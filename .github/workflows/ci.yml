name: LexIndia Production CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    name: Build, Lint & Lighthouse
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Type Check
        run: npx tsc --noEmit

      - name: ESLint Check
        run: npm run lint

      - name: Build Next.js Application
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          # Include placeholder ENV VARS from local if they fail build without them, 
          # but we recommend keeping build-time secrets in Github Secrets!

      - name: Run Lighthouse CI Action
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:3000/
            http://localhost:3000/lawyers
            http://localhost:3000/guides
          buildScript: npm run build
          serverScript: npm run start
          uploadArtifacts: true
          temporaryPublicStorage: true
          # Enforce passing metrics matching task 5.4.2 criteria
          budgetPath: ./lighthouserc.json
